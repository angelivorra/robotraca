<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Retro Song Experience</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        #subtitles {
            position: absolute; bottom: 10%; width: 100%; text-align: center;
            color: #fff; font-size: 24px; text-shadow: 2px 2px #ff0000, -2px -2px #0000ff;
            pointer-events: none; text-transform: uppercase;
        }
        canvas { image-rendering: pixelated; } /* Clave para el look retro */
    </style>
</head>
<body>
    <div id="subtitles">HAZ CLICK PARA EMPEZAR</div>
    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        let scene, camera, renderer, analyser, dataArray;
        let cubes = [];
        const subtitlesDiv = document.getElementById('subtitles');

        // 1. Configuración de la Escena
        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            // Renderizador con resolución baja para efecto pixelado
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth / 4, window.innerHeight / 4, false);
            renderer.domElement.style.width = '100vw';
            renderer.domElement.style.height = '100vh';
            document.body.appendChild(renderer.domElement);

            // Crear elementos visuales (cubos que reaccionarán)
            for(let i = 0; i < 10; i++) {
                const geo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
                const mat = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });
                const cube = new THREE.Mesh(geo, mat);
                cube.position.x = (i - 5) * 0.8;
                scene.add(cube);
                cubes.push(cube);
            }

            window.addEventListener('click', setupAudio, { once: true });
            animate();
        }

        // 2. Análisis de Audio
        function setupAudio() {
            const listener = new THREE.AudioListener();
            camera.add(listener);

            const sound = new THREE.Audio(listener);
            const audioLoader = new THREE.AudioLoader();
            
            // Reemplaza con tu archivo mp3
            audioLoader.load('abduccion.mp3', function(buffer) {
                sound.setBuffer(buffer);
                sound.setLoop(true);
                sound.setVolume(0.5);
                sound.play();
            });

            analyser = new THREE.AudioAnalyser(sound, 128);
            dataArray = analyser.data;
        }

        // 3. Sistema de Subtítulos
        const script = [
            { time: 2, text: "BIENVENIDO AL SISTEMA" },
            { time: 5, text: "SINTONIZANDO SEÑAL..." },
            { time: 10, text: "ESTO ES 16-BIT" }
        ];

        function updateSubtitles(currentTime) {
            const currentLine = script.findLast(line => currentTime >= line.time);
            if (currentLine) {
                subtitlesDiv.innerText = currentLine.text;
            }
        }

        // 4. Bucle de Animación e Interacción
        function animate() {
            requestAnimationFrame(animate);

            if (analyser) {
                const data = analyser.getFrequencyData();
                const time = analyser.audio.context.currentTime - analyser.audio.startTime; // Tiempo simplificado
                
                updateSubtitles(analyser.audio.context.currentTime);

                // Los cubos reaccionan al bajo (frecuencias bajas)
                cubes.forEach((cube, i) => {
                    const s = data[i * 2] / 50;
                    cube.scale.y = s + 1;
                    cube.rotation.x += 0.01;
                });
            }

            renderer.render(scene, camera);
        }

        // Evento de mouse para interactividad
        window.addEventListener('mousemove', (e) => {
            camera.position.x = (e.clientX / window.innerWidth - 0.5) * 2;
            camera.position.y = -(e.clientY / window.innerHeight - 0.5) * 2;
            camera.lookAt(0,0,0);
        });
    </script>
</body>
</html>
