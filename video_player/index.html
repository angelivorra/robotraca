<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ROBOTRACA // 8-BIT PLAYER</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <!-- Three.js via importmap (no npm, no build step) -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>

    <!-- ═══════════════════════════════════════════════════════════
         MAIN SCREEN — Song list
    ═══════════════════════════════════════════════════════════ -->
    <div class="screen main-screen" id="mainScreen">
        <header class="header-8bit">
            <h1 class="title-8bit">ROBOTRACA</h1>
            <p class="subtitle-8bit">♪ SELECT YOUR TRACK ♪</p>
        </header>

        <div class="song-list" id="songList">
            <!-- Generated by player.js -->
        </div>

        <footer class="footer-8bit">
            <span class="blink">► PRESS TO PLAY ◄</span>
        </footer>
    </div>

    <!-- ═══════════════════════════════════════════════════════════
         PLAYER SCREEN — Three.js canvas + controls
    ═══════════════════════════════════════════════════════════ -->
    <div class="screen player-screen hidden" id="playerScreen">

        <!-- Three.js renders here (z-index: 0) -->
        <canvas id="threeCanvas"></canvas>

        <!-- Beat flash overlay (brief white pulse on each beat) -->
        <div id="beatFlash" class="beat-flash"></div>

        <!-- Subtitle display (above the canvas, below buttons) -->
        <div id="subtitleDisplay" class="subtitle-display"></div>

        <!-- Loading overlay (shown while assets are fetching) -->
        <div id="loadingOverlay" class="loading-overlay">
            <p class="loading-text">LOADING...</p>
            <div class="loading-bar-track">
                <div id="loadingBar" class="loading-bar"></div>
            </div>
        </div>

        <!-- Controls (same positions as original) -->
        <button class="btn-8bit btn-back" id="btnBack" aria-label="Volver">
            <span class="btn-icon">←</span>
            <span class="btn-text">BACK</span>
        </button>

        <button class="btn-8bit btn-play" id="btnPlay" aria-label="Reproducir">
            <span class="btn-icon" id="playIcon">▶</span>
        </button>

        <button class="btn-8bit btn-prev" id="btnPrev" aria-label="Anterior">
            <span class="btn-icon">◀◀</span>
        </button>

        <button class="btn-8bit btn-next" id="btnNext" aria-label="Siguiente">
            <span class="btn-icon">▶▶</span>
        </button>
    </div>

    <!-- Entry point (type=module picks up the importmap) -->
    <script type="module" src="js/player.js"></script>
</body>
</html>
